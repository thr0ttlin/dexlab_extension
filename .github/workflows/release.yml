name: Release VSIX

on:
  push:
    tags:
      - 'v*'          # trigger version

jobs:
  build:
    name: Build & publish VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile          # adjust if your package.json script differs

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o dexlab-${{ github.ref_name }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DEXLab ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0-beta → prerelease
          files: dexlab-${{ github.ref_name }}.vsix
          body: |
            ## DEXLab ${{ github.ref_name }}

            ### Install in VS Code
            ```bash
            code --install-extension dexlab-${{ github.ref_name }}.vsix
            ```
            Or open VS Code → Extensions → `···` → *Install from VSIX…*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}